<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>线上铺货</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #dfe5ee;
      --muted-line: #edf1f5;
      --text: #172033;
      --muted: #657286;
      --soft: #f8fafc;
      --blue: #1677ff;
      --blue-strong: #0f63d8;
      --blue-soft: #eaf3ff;
      --green: #1f9d64;
      --green-soft: #e9f8f0;
      --amber: #b56a00;
      --amber-soft: #fff4df;
      --red: #d92d20;
      --red-soft: #fff0ee;
      --slate: #0f172a;
      --radius: 8px;
      --shadow: 0 12px 34px rgba(15, 23, 42, .18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: flex;
      height: 100vh;
      min-width: 1180px;
    }

    .main {
      display: flex;
      min-width: 0;
      min-height: 0;
      width: 100%;
      flex-direction: column;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header .top-actions {
      gap: 2px;
    }

    .panel-header .top-actions .btn {
      min-height: 30px;
      padding: 0 6px;
      font-size: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(460px, 2fr) minmax(280px, 1fr);
      gap: 12px;
      min-height: 0;
      flex: 1;
      padding: 12px;
    }

    .panel {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 760;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      font-weight: 650;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: #b9c7d8;
    }

    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: var(--blue-strong);
    }

    .btn.danger {
      border-color: #ffb4ad;
      background: #ffffff;
      color: var(--red);
    }

    .btn.ghost {
      border-color: transparent;
      background: transparent;
      color: var(--blue);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: .54;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--muted);
    }

    .icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .search {
      position: relative;
      padding: 10px 12px 8px;
    }

    .search .icon {
      position: absolute;
      top: 21px;
      left: 24px;
      color: #9aa7b8;
    }

    .search input {
      width: 100%;
      height: 38px;
      padding: 0 12px 0 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      outline: none;
      background: #f7f9fb;
      color: var(--text);
    }

    .search input:focus {
      border-color: var(--blue);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(22, 119, 255, .12);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 0 12px 8px;
    }

    .tab {
      min-height: 36px;
      border-radius: 7px;
      background: #f4f6f8;
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--blue-soft);
      color: var(--blue);
      box-shadow: inset 0 0 0 1px rgba(22, 119, 255, .22);
    }

    .status-hint {
      margin: 0 12px 8px;
      padding: 7px 9px;
      border-radius: 6px;
      background: #e3f2ff;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 12px 10px;
      border-bottom: 1px solid var(--muted-line);
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 30px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .filter-btn.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }

    .queue {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 8px;
    }

    .queue-item {
      display: grid;
      gap: 6px;
      width: 100%;
      min-height: 92px;
      margin-bottom: 8px;
      padding: 10px;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px #eef2f7;
    }

    .queue-item:hover {
      border-color: #c8d6e8;
    }

    .queue-item.active {
      border-color: var(--blue);
      background: #f7fbff;
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .queue-item.paired {
      min-height: 182px;
      cursor: pointer;
    }

    .queue-compare {
      display: grid;
      gap: 8px;
    }

    .queue-compare-row {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      align-items: center;
      gap: 9px;
    }

    .queue-label-block {
      display: grid;
      place-items: center;
      min-height: 54px;
      border-radius: 7px;
      color: #ffffff;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      background: var(--blue);
    }

    .queue-label-block.takeout {
      background: #f4a600;
    }

    .queue-pair-name {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      margin-bottom: 3px;
    }

    .queue-pair-name .item-name {
      flex: 1;
      min-width: 0;
    }

    .sync-row,
    .list-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sync-row {
      padding-top: 4px;
      border-top: 1px solid var(--muted-line);
    }

    .sync-choice {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .sync-choice::before {
      content: "";
      width: 16px;
      height: 16px;
      border: 2px solid #b7c1ce;
      border-radius: 50%;
      background: #ffffff;
    }

    .sync-choice.active {
      color: var(--blue);
    }

    .sync-choice.active::before {
      border: 5px solid var(--blue);
    }

    .list-actions {
      min-height: 52px;
      padding: 8px 10px;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .code {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      font-weight: 750;
    }

    .item-name {
      overflow: hidden;
      color: var(--text);
      font-weight: 760;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .item-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tags {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #eef2f7;
      color: #506073;
      font-size: 12px;
      font-weight: 720;
      white-space: nowrap;
    }

    .tag.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .tag.green {
      background: var(--green-soft);
      color: var(--green);
    }

    .tag.amber {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .tag.red {
      background: var(--red-soft);
      color: var(--red);
    }

    .detail-scroll,
    .candidate-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    .detail-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--muted-line);
    }

    .detail-main-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.32;
    }

    .sequence {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .detail-code {
      display: grid;
      justify-items: end;
      gap: 4px;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-code strong {
      color: var(--text);
      font-size: 15px;
    }

    .barcode-card {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      width: calc(100% - 32px);
      margin: 14px 16px 8px;
      padding: 10px 12px;
      border: 1px solid #b8d7ff;
      border-radius: 8px;
      background: #f3f8ff;
      text-align: left;
      color: var(--text);
    }

    .barcode-label {
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--blue);
      font-weight: 780;
      text-align: left;
    }

    .barcode-card input {
      width: 100%;
      min-width: 0;
      height: 34px;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 20px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .hint-line {
      padding: 0 16px 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .hint-line button {
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--blue);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    .form-grid {
      display: grid;
      gap: 1px;
      margin: 0 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--line);
    }

    .field {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      align-items: center;
      min-height: 46px;
      background: #ffffff;
    }

    .field label {
      padding-left: 12px;
      color: var(--muted);
      font-weight: 650;
    }

    .field.required label::before {
      content: "*";
      margin-right: 2px;
      color: var(--red);
    }

    .field input,
    .field select {
      width: 100%;
      min-width: 0;
      height: 44px;
      border: 0;
      outline: none;
      padding: 0 12px;
      background: transparent;
      color: var(--text);
      font-weight: 650;
    }

    .reset-row {
      display: flex;
      justify-content: flex-end;
      padding: 10px 16px 12px;
    }

    .action-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    .action-left,
    .action-right {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .candidate-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: stretch;
      min-height: 156px;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--muted-line);
      background: #ffffff;
      cursor: pointer;
    }

    .candidate-card.current {
      background: #f7fbff;
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .product-art {
      position: relative;
      width: 72px;
      height: 72px;
      overflow: hidden;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      background: #f97316;
    }

    .product-art.blue-art {
      background: #2563eb;
    }

    .product-art.green-art {
      background: #16a34a;
    }

    .product-art::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 14px;
      height: 34px;
      border-radius: 4px;
      background: #ffffff;
    }

    .product-art::after {
      content: "";
      position: absolute;
      left: 19px;
      right: 19px;
      bottom: 13px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .72);
    }

    .candidate-card > .product-art {
      width: 100%;
      height: auto;
      min-height: 132px;
      aspect-ratio: 1 / 1;
    }

    .candidate-body {
      display: flex;
      min-height: 132px;
      min-width: 0;
      flex-direction: column;
      justify-content: center;
    }

    .candidate-name {
      margin: 0 0 5px;
      font-weight: 790;
      line-height: 1.32;
    }

    .candidate-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .compare {
      margin: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .compare-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid var(--muted-line);
    }

    .compare-row:last-child {
      border-bottom: 0;
    }

    .label-block {
      display: grid;
      place-items: center;
      min-height: 62px;
      border-radius: 7px;
      color: #ffffff;
      font-weight: 800;
      text-align: center;
      background: var(--blue);
    }

    .label-block.takeout {
      background: #f4a600;
    }

    .diff {
      color: var(--red);
      font-weight: 780;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .drawer-backdrop,
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(15, 23, 42, .46);
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 40;
      display: flex;
      flex-direction: column;
      width: 430px;
      max-width: calc(100vw - 120px);
      height: 100vh;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .drawer-header,
    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 56px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 16px 18px;
    }

    .guide-callout {
      padding: 12px;
      border: 1px solid #cfe3ff;
      border-radius: 8px;
      background: #f3f8ff;
      color: #0f4f9f;
      font-weight: 650;
    }

    .guide-steps {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .guide-image {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .input-row {
      display: grid;
      gap: 7px;
      margin-top: 16px;
    }

    .input-row label {
      color: var(--muted);
      font-weight: 700;
    }

    .input-row input {
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      outline: none;
    }

    .input-row input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, .12);
    }

    .error-text {
      min-height: 18px;
      color: var(--red);
      font-size: 12px;
      font-weight: 700;
    }

    .drawer-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px;
      border-top: 1px solid var(--line);
    }

    .modal-backdrop {
      display: grid;
      place-items: center;
      z-index: 50;
    }

    .dialog {
      width: 430px;
      max-width: calc(100vw - 40px);
      overflow: hidden;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .dialog-body {
      padding: 16px 18px;
    }

    .dialog-title {
      margin: 0;
      font-size: 18px;
      font-weight: 820;
    }

    .dialog-copy {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .dialog-art {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin: 12px 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .dialog-art .product-art {
      width: 108px;
      height: 108px;
    }

    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px 16px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 70;
      min-width: 260px;
      max-width: 420px;
      padding: 12px 14px;
      border: 1px solid #bad7ff;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      box-shadow: var(--shadow);
      font-weight: 690;
    }

    .disclaimer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 30px;
      padding: 0 14px;
      border-top: 1px solid var(--line);
      background: #ffffff;
      color: #8a95a5;
      font-size: 12px;
    }

    .disclaimer-link {
      padding: 0;
      background: transparent;
      color: var(--blue);
      font-size: 12px;
    }

    .agreement-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, .62);
    }

    .agreement-dialog {
      width: 460px;
      max-width: calc(100vw - 40px);
      overflow: hidden;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .agreement-copy {
      min-height: 126px;
      padding: 20px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .agreement-dialog .dialog-footer .btn {
      flex: 1;
    }

    .tutorial-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(15, 23, 42, .66);
    }

    .tutorial-focus {
      position: relative;
      z-index: 82;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 0 0 3px #ffffff, 0 0 0 6px var(--blue);
    }

    .tutorial-card {
      position: fixed;
      left: 50%;
      bottom: 48px;
      z-index: 84;
      display: flex;
      align-items: center;
      gap: 16px;
      width: min(620px, calc(100vw - 40px));
      padding: 14px 16px;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
      transform: translateX(-50%);
    }

    .tutorial-copy {
      flex: 1;
      margin: 0;
      font-weight: 700;
      line-height: 1.55;
    }

    @media (max-width: 1320px) {
      .app {
        min-width: 1180px;
      }

      .workspace {

    function setMode(mode) {

      state.selectedId = first ? first.id : "";
      state.modal = null;
      render();

    function setKeyword(value) {
      state.keyword = value;
      render();
    }

    function toggleFilter(key) {
      state.filters[key] = !state.filters[key];
      if (key === "hasRed" && state.filters.hasRed) state.filters.noRed = false;
      if (key === "noRed" && state.filters.noRed) state.filters.hasRed = false;
      render();
    }

    function clearFilters() {
      state.keyword = "";
      state.filters = { priority: false, recent: false, drug: false, collected: false, hasRed: false, noRed: false };
      render();
    }

    function togglePendingSelection(id) {
      if (state.pendingSelected.has(id)) state.pendingSelected.delete(id);
      else state.pendingSelected.add(id);
      render();
    }

    function toggleAllPending() {
      const visibleIds = getFilteredProducts().map(item => item.id);
      const allSelected = visibleIds.length > 0 && visibleIds.every(id => state.pendingSelected.has(id));
      visibleIds.forEach(id => {
        if (allSelected) state.pendingSelected.delete(id);
        else state.pendingSelected.add(id);
      });
      render();
    }

    function movePendingToSynced(id) {
      const index = pendingProducts.findIndex(item => item.id === id);
      if (index < 0) return;
      const [product] = pendingProducts.splice(index, 1);
      product.syncStatus = true;
      syncedProducts.unshift(product);
      state.pendingSelected.delete(id);
      state.counts.pending = Math.max(0, state.counts.pending - 1);
      state.counts.synced += 1;
    }

    function syncSingle(id) {
      movePendingToSynced(id);
      const next = pendingProducts[0];
      state.selectedId = next ? next.id : "";
      render();
    }

    function syncSelected() {
      [...state.pendingSelected].forEach(movePendingToSynced);
      const next = pendingProducts[0];
      state.selectedId = next ? next.id : "";
      render();
    }

    function selectProduct(id) {
      state.selectedId = id;
      state.modal = null;
      state.guide.open = false;
      render();
    }

    function updateField(key, value) {
      const product = getSelected();
      if (!product) return;
      product[key] = value;
      render();
    }

    function handleFieldInput(key, value) {
      const product = getSelected();
      if (!product) return;
      product[key] = value;
      const resetRow = document.getElementById("resetRow");
      if (resetRow) {
        resetRow.innerHTML = productDirty(product) ? resetButtonHtml() : "";
      }
    }

    function resetSelectedProduct() {
      const product = getSelected();
      if (!product) return;
      resetProduct(product);
    }

    function openUpcGuide() {
      const product = getSelected();
      if (!product) return;
      state.guide = { open: true, value: product.barcode || "", error: "" };
      render();
    }

    function closeGuide() {
      state.guide.open = false;
      render();
    }

    function validUpc(value) {
      return /^[0-9]{6,15}$/.test(String(value || ""));
    }

    function submitUpc() {
      const value = String(state.guide.value || "").trim();
      if (!validUpc(value)) {
        state.guide.error = "请输入合规upc";
        render();
        return;
      }
      const product = getSelected();
      if (product) {
        product.barcode = value;
        if (value === "693278327287") product.collected = true;
      }
      state.guide.open = false;
      if (value === "693278327287") {
        state.modal = { type: "comfort", upc: value };
      } else {
        const candidate = product && product.candidates[0]
          ? product.candidates[0]
          : { id: "generated", name: `${product.name} 外卖标品`, upc: value, approvalNo: product.approvalNo, manufacturer: product.manufacturer, category: product.category, confidence: "high", duplicate: false, art: "green" };
        state.modal = { type: "success", candidate };
      }
      render();
    }

    function rematchSelected() {
      const product = getSelected();
      if (!product) return;
      if (!validUpc(product.barcode)) {
        state.guide = { open: true, value: product.barcode || "", error: "请输入合规upc" };
        render();
        return;
      }
      if (product.collected || product.barcode === "693278327287") {
        product.collected = true;
        state.modal = { type: "comfort", upc: product.barcode };
      } else {
        const candidate = product.candidates.find(item => !item.current) || product.candidates[0] || { id: "generated", name: `${product.name} 外卖标品`, upc: product.barcode, approvalNo: product.approvalNo, manufacturer: product.manufacturer, category: product.category, confidence: "high", duplicate: false, art: "green" };
        state.modal = { type: state.mode === "unmatched" ? "success" : "rematch", candidate, source: "auto" };
      }
      render();
    }

    function openCandidate(candidateId) {
      const product = getSelected();
      if (!product) return;
      const candidate = product.candidates.find(item => item.id === candidateId) || product.current;
      if (state.mode !== "unmatched") {
        state.modal = { type: candidate.current ? "current" : "rematch", candidate, source: "candidate" };
        render();
        return;
      }
      state.modal = { type: "confirmLink", product, candidate };
      render();
    }

    function closeModal() {
      state.modal = null;
      render();
    }

    function confirmMatch() {
      const product = getSelected();
      const candidate = state.modal && state.modal.candidate;
      const list = getFilteredProducts();
      const index = sequenceIndex();
      const nextId = index >= 0 && index < list.length - 1 ? list[index + 1].id : "";
      const last = isLastInSequence();
      state.modal = null;
      if (state.mode === "unmatched" && product && candidate) {
        const sourceIndex = unmatchedProducts.findIndex(item => item.id === product.id);
        if (sourceIndex >= 0) unmatchedProducts.splice(sourceIndex, 1);
        product.current = { ...candidate, current: true };
        product.candidates = product.candidates.some(item => item.id === candidate.id)
          ? product.candidates.map(item => ({ ...item, current: item.id === candidate.id }))
          : [{ ...candidate, current: true }, ...product.candidates.map(item => ({ ...item, current: false }))];
        product.syncStatus = true;
        product.hasRed = false;
        syncedProducts.unshift(product);
        state.counts.unmatched = Math.max(0, state.counts.unmatched - 1);
        state.counts.synced += 1;
        if (!last && nextId) state.selectedId = nextId;
        else if (unmatchedProducts.length) state.selectedId = unmatchedProducts[0].id;
        else {
          state.mode = "synced";
          state.selectedId = product.id;
        }
      } else if (!last) {
        selectNextProduct();
      }
      render();
    }

    function confirmRematch() {
      const product = getSelected();
      const candidate = state.modal && state.modal.candidate;
      if (product && candidate) {
        product.current = { ...candidate, current: true };
        product.candidates = product.candidates.some(item => item.id === candidate.id)
          ? product.candidates.map(item => ({ ...item, current: item.id === candidate.id }))
          : [{ ...candidate, current: true }, ...product.candidates.map(item => ({ ...item, current: false }))];
      }
      state.modal = null;
      if (state.mode === "pending" && product) {
        movePendingToSynced(product.id);
        state.selectedId = pendingProducts[0] ? pendingProducts[0].id : "";
      }
      render();
    }

    function selectNextProduct() {
      const list = getFilteredProducts();
      const index = sequenceIndex();
      if (index >= 0 && index < list.length - 1) {
        state.selectedId = list[index + 1].id;
      }
    }

    function skipNext() {
      selectNextProduct();
      render();
    }

    function openUnlinkConfirm() {
      state.modal = { type: "unlink" };
      render();
    }

    function confirmUnlink() {
      const product = getSelected();
      if (product) {
        state.unlinked[product.id] = true;
        const source = state.mode === "pending" ? pendingProducts : syncedProducts;
        const sourceIndex = source.findIndex(item => item.id === product.id);
        if (sourceIndex >= 0) source.splice(sourceIndex, 1);
        if (state.mode === "pending") state.counts.pending = Math.max(0, state.counts.pending - 1);
        if (state.mode === "synced") state.counts.synced = Math.max(0, state.counts.synced - 1);
        product.current = null;
        product.candidates = product.candidates.map(item => ({ ...item, current: false }));
        product.autoLabel = "ignore";
        unmatchedProducts.unshift(product);
        state.counts.unmatched += 1;
        state.mode = "unmatched";
        state.selectedId = product.id;
      }
      state.modal = null;
      render();
    }

    function openDisclaimer() {
      state.disclaimer = { open: true, initial: false, seconds: 0 };
      render();
    }

    function acceptDisclaimer() {
      if (state.disclaimer.seconds > 0) return;
      try {
        localStorage.setItem(DISCLAIMER_KEY, "accepted");
      } catch (error) {
        // The demo still proceeds when local storage is unavailable.
      }
      state.disclaimer.open = false;
      state.disclaimer.initial = false;
      if (disclaimerTimer) clearInterval(disclaimerTimer);
      disclaimerTimer = null;
      render();
    }

    function rejectDisclaimer() {
      window.history.back();
    }

    function startDisclaimerCountdown() {
      if (!state.disclaimer.open || !state.disclaimer.initial || state.disclaimer.seconds <= 0 || disclaimerTimer) return;
      disclaimerTimer = window.setInterval(() => {
        state.disclaimer.seconds = Math.max(0, state.disclaimer.seconds - 1);
        renderAgreement();
        if (state.disclaimer.seconds === 0) {
          clearInterval(disclaimerTimer);
          disclaimerTimer = null;
        }
      }, 1000);
    }

    function toggleTutorial() {
      if (state.tutorial.open) {
        state.tutorial.open = false;
        render();
        return;
      }
      state.tutorial = { open: true, step: 0 };
      applyTutorialStep();
    }

    function applyTutorialStep() {
      const step = tutorialSteps[state.tutorial.step];
      state.mode = step.mode;
      state.keyword = "";
      if (step.mode === "pending" && state.tutorial.step >= 6) state.filters.hasRed = true;
      const first = getProducts()[0];
      state.selectedId = first ? first.id : "";
      state.modal = null;
      render();
    }

    function nextTutorialStep() {
      if (state.tutorial.step >= tutorialSteps.length - 1) {
        state.tutorial.open = false;
        render();
        return;
      }
      state.tutorial.step += 1;
      applyTutorialStep();
    }

    function runSync() {
      return;
    }

    function showToast(message) {
      state.toast = "";
      renderToast();
    }

    render();
    startDisclaimerCountdown();
  </script>
</body>
</html>
